<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Indicator · Singer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14141a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #14141a;
    color: #f0f0f0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── 상단 바 ── */
  #top {
    flex-shrink: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 6px;
    gap: 4px;
  }

  #clock {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px; font-weight: 600;
    color: #555566;
    font-variant-numeric: tabular-nums;
  }

  /* 곡 휠 */
  #song-vp { width: 100%; overflow: hidden; }
  #song-track {
    display: flex;
    align-items: baseline;
    gap: 20px;
    white-space: nowrap;
    padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name {
    font-size: 10px; font-weight: 600; color: #1e1e32;
    white-space: nowrap; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name.p2 { font-size: clamp(10px, 1.3vw, 17px); color: #28283e; }
  .s-name.p1 { font-size: clamp(13px, 1.8vw, 24px); color: #36365a; }
  .s-name.active { font-size: clamp(18px, 2.6vw, 36px); font-weight: 800; color: #f0f0f0; }
  .s-name.n1 { font-size: clamp(13px, 1.8vw, 24px); color: #36365a; }
  .s-name.n2 { font-size: clamp(10px, 1.3vw, 17px); color: #28283e; }

  /* 키 */
  #key-label {
    font-size: 11px; font-weight: 700;
    color: #5DCAA5;
    letter-spacing: 0.04em;
  }

  /* ── 중간 영역 (현재+다음 카드) ── */
  #middle {
    flex: 1; min-height: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 0 10px 10px;
    gap: 0;
  }

  /* ── 현재 섹션 카드 ── */
  #cur-box {
    flex: 1;                 /* 다음 박스가 한 줄로 얇아진 만큼 현재 가사가 최대한 차지 */
    min-height: 0;
    border: 2px solid #5DCAA5;
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    margin-bottom: 0;
  }

  #cur-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 14px;
    min-width: 0;
  }

  .card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
    margin-bottom: 6px;
    gap: 8px;
    min-width: 0;
  }
  #cur-section-label {
    font-size: clamp(14px, 2.2vw, 32px);
    font-weight: 700;
    color: #5DCAA5;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  #cur-singer-note {
    font-size: clamp(13px, 2vw, 30px);
    font-weight: 700;
    color: #E8A840;
    text-align: right;
    flex-shrink: 1;
    min-width: 0;
    line-height: 1.3;
  }

  #cur-lyric-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    min-height: 0;
    min-width: 0;
    overflow: hidden;   /* 자동 맞춤 실패 시에도 카드 밖으로 넘치지 않게 */
  }

  /* 가사+코드 줄별 렌더 */
  .lyric-line {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .lyric-char {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .lyric-char.ghost { min-width: 0.8em; }
  /* 크기 체계: 줄(.lyric-line)에 기준 폰트를 걸고 글자는 상속 —
     자동 맞춤(fitLyricLines)이 줄 단위로 축소할 수 있게 함 */
  #cur-lyric-wrap .lyric-line {
    font-size: clamp(24px, 7.5vw, 120px);
  }
  #cur-lyric-wrap .lyric-char {
    font-size: inherit;
    font-weight: 700;
    line-height: 1.3;
    color: #ffffff;
    letter-spacing: 0.1em;
  }
  #nxt-lyric-wrap .lyric-line {
    font-size: clamp(18px, 4.2vw, 64px);  /* 스트립 안에서 최대한 크게 (자동 맞춤이 높이 제한) */
  }
  #nxt-lyric-wrap .lyric-char {
    font-size: inherit;
    font-weight: 600;
    line-height: 1.3;
    color: #555;
  }
  /* 코드는 가사 크기에 비례 (가사 조절 시 자동 연동) */
  .chord-label {
    font-size: 0.42em; font-weight: 700;
    color: #5DCAA5;
    white-space: nowrap;
    line-height: 1.3;
    letter-spacing: 0;
    /* 인접 코드끼리 붙어서 하나로 읽히는 문제 방지 (A/C# + D → "A/C#D").
       코드가 글자보다 넓어 칸 폭을 결정하는 경우에만 실제 간격이 벌어짐 */
    padding-right: 0.8em;
  }
  .chord-label-empty { color: transparent; padding-right: 0; }
  #nxt-lyric-wrap .chord-label {
    color: #3d7a6a;
  }
  #nxt-lyric-wrap .chord-label-empty { color: transparent; }

  /* ── 카운트다운 (카드 경계에 오버랩) ── */
  #cd-overlap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    /* top은 JS로 cur-box 하단에 맞춤 */
    pointer-events: none;
  }

  #cd-num {
    font-size: clamp(28px, 5vw, 72px);
    font-weight: 900;
    color: #5DCAA5;
    line-height: 1;
    letter-spacing: -0.04em;
    background: #14141a;
    padding: 0 10px;
  }
  #cd-num.beat-pop {
    animation: beatpop 0.18s cubic-bezier(0.2,0,0.4,1) forwards;
  }
  @keyframes beatpop {
    0%   { transform: scale(1.3); color: #fff; }
    60%  { transform: scale(0.95); color: #5DCAA5; }
    100% { transform: scale(1.0);  color: #5DCAA5; }
  }

  /* ── 다음 섹션 카드 ── */
  #nxt-box {
    flex: 0 0 clamp(96px, 20vh, 210px);  /* 고정 높이 스트립 — 내용 유무와 무관 */
    min-height: 0;
    border: 1.5px solid #2a2a3a;
    border-radius: 10px;
    display: flex;
    overflow: hidden;
  }

  #nxt-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 6px 12px 8px;
    min-width: 0;
  }

  .nxt-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
    margin-bottom: 2px;
    gap: 6px;
    min-width: 0;
  }
  #nxt-section-label {
    font-size: clamp(12px, 1.8vw, 26px);
    font-weight: 700;
    color: #3a3a52;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  #nxt-singer-note {
    font-size: clamp(11px, 1.6vw, 24px);
    font-weight: 700;
    color: #b07820;
    text-align: right;
    flex-shrink: 1;
    min-width: 0;
    line-height: 1.3;
  }

  #nxt-lyric-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }

  /* 다음 섹션이 곡 전환일 때 — 키컬러로 크게 + 조표/박자표/BPM 미리보기 */
  #nxt-song-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  #nxt-song-name {
    font-size: clamp(18px, 3vw, 44px);
    font-weight: 800;
    color: #5DCAA5;
    letter-spacing: -0.02em;
  }
  #nxt-song-meta {
    display: flex;
    gap: 8px;
    font-size: clamp(11px, 1.6vw, 18px);
    font-weight: 700;
    color: #3d7a6a;
    letter-spacing: 0.04em;
  }

  /* ── 오프라인 ── */
  #offline {
    position: fixed; inset: 0;
    background: rgba(14,14,20,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #888; z-index: 99;
  }
  .hidden { display: none !important; }
  .inst-disp-grid { display: flex; align-items: center; justify-content: center; flex-wrap: nowrap; gap: 0; padding: 4px 0; width: 100%; overflow-x: auto; }
  .inst-disp-bar { display: flex; flex: 0 0 auto; flex-direction: row; align-items: center; justify-content: center; gap: 12px; padding: 2px 14px; }
  .inst-disp-div { width: 1px; flex-shrink: 0; height: 36px; background: #333; margin: 0 4px; }
  .inst-disp-chord { font-size: clamp(16px,3vw,30px); color: #5DCAA5; font-weight: 700; line-height: 1.2; white-space: nowrap; }
  .inst-disp-dot { font-size: clamp(16px,3vw,30px); color: #2a2a3a; font-weight: 700; line-height: 1.2; }
</style>
</head>
<body>

<div id="offline">연결 중…</div>

<!-- 상단 바 -->
<div id="top">
  <div id="clock">--:--</div>
  <div id="song-vp"><div id="song-track"></div></div>
  <div id="key-label"></div>
</div>

<!-- 현재 + 다음 카드 -->
<div id="middle">

  <div id="cur-box">
    <div id="cur-content">
      <div class="card-top-row">
        <div id="cur-section-label">—</div>
        <div id="cur-singer-note" class="hidden"></div>
      </div>
      <div id="cur-lyric-wrap">
        <div class="lyric-block" id="cur-lyric-block"></div>
      </div>
    </div>
  </div>

  <!-- 카운트: 카드 경계에 걸쳐 표시 -->
  <div id="cd-overlap"><div id="cd-num"></div></div>

  <div id="nxt-box">
    <div id="nxt-content">
      <div class="nxt-top-row">
        <div id="nxt-section-label"></div>
        <div id="nxt-singer-note" class="hidden"></div>
      </div>
      <div id="nxt-lyric-wrap">
        <div class="lyric-block" id="nxt-lyric-block"></div>
      </div>
      <div id="nxt-song-display" class="hidden">
        <div id="nxt-song-name"></div>
        <div id="nxt-song-meta"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  // ── 가사 캐시 (/edit DATA 파싱) ──
  // flat sorted slide array: { songName: [{ secName, secIdx, abs, slide }] } — abs = 곡 시작 기준 절대 초.
  // 곡 전체를 하나의 연속 흐름으로 취급해야 섹션 첫 슬라이드의 음수 오프셋(마커보다 먼저 전환)이
  // 마커를 넘기 전에도 정상적으로 뜸 (편집 화면의 songSlideList와 동일한 개념)
  let lyricSlides = {};
  let songSections = {};  // songName -> [{sec, startInSong, durationSec}, ...]
  let lastKnownState = null;

  // 슬라이드 전환 위치(섹션 시작 기준 초) 해석: startSec 없는(아직 안 찍은) 슬라이드는
  // 앞뒤로 확정된 위치 사이를 균등 분할한 임시 위치 사용 — 편집 화면과 동일 규칙.
  // 첫 슬라이드도 오프셋 가능(0=마커와 동시, 음수=마커보다 먼저) — 편집 화면 resolvePositions와 동일
  function resolveSlideSecs(slides, durationSec) {
    const n = slides.length;
    const out = new Array(n);
    if (n === 0) return out;
    out[0] = slides[0].startSec ?? 0;
    let i = 1;
    while (i < n) {
      const v = slides[i] ? slides[i].startSec : null;
      if (v != null) { out[i] = v; i++; continue; }
      let j = i;
      while (j < n && (slides[j] ? slides[j].startSec : null) == null) j++;
      const endSec = j < n ? slides[j].startSec : (durationSec > 0 ? durationSec : out[i-1] + (n - i + 1) * 5);
      const span = Math.max(0, endSec - out[i-1]);
      const cnt = j - i + 1;
      for (let k = i; k < j; k++) out[k] = out[i-1] + span * (k - i + 1) / cnt;
      i = j;
    }
    for (let k = 1; k < n; k++) if (out[k] < out[k-1] + 0.05) out[k] = out[k-1] + 0.05;
    return out;
  }

  async function fetchLyricCache() {
    try {
      const html = await fetch('/edit').then(r => r.text());
      const startMark = 'const DATA=';
      const endMark = ';//EXPORT_DATA_LINE';
      const si = html.indexOf(startMark);
      const ei = html.indexOf(endMark);
      if (si < 0 || ei < 0 || ei <= si) return;
      const data = JSON.parse(html.slice(si + startMark.length, ei));
      lyricSlides = {};
      songSections = {};
      data.forEach(song => {
        const arr = [];
        songSections[song.song] = (song.sections || []).map(sec => ({ sec: sec.sec, startInSong: sec.startInSong || 0, durationSec: sec.durationSec || 0 }));
        (song.sections || []).forEach((sec, secIdx) => {
          const slides = (sec.slides && sec.slides.length) ? sec.slides : [];
          const secs = resolveSlideSecs(slides, sec.durationSec || 0);
          slides.forEach((slide, i) => {
            arr.push({ secName: sec.sec, secIdx, abs: (sec.startInSong || 0) + secs[i], slide,
                       beatsPerBar: sec.beatsPerBar || 4, beatUnit: sec.beatUnit || 4 });
          });
        });
        arr.sort((a, b) => a.abs - b.abs);
        lyricSlides[song.song] = arr;
      });
      if (lastKnownState) applyState(lastKnownState);
    } catch(e) {}
  }

  // absSec = 곡 시작 기준 절대 초. 곡 전체를 하나의 흐름으로 검색하므로 다음 섹션 첫 슬라이드의
  // 음수 오프셋도 마커를 넘기 전에 자연스럽게 "현재"로 선택됨
  function findCurrentEntry(songName, absSec) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    let best = arr[0];
    for (const e of arr) { if (e.abs <= absSec) best = e; else break; }
    return best;
  }

  function findNextEntry(songName, absSec) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    return arr.find(e => e.abs > absSec) || null;
  }

  fetchLyricCache();

  // ── SSE ──
  let reconnectDelay = 1000;
  function connect() {
    const es = new EventSource('/events');
    es.onopen = () => { reconnectDelay = 1000; $('offline').classList.add('hidden'); fetchLyricCache(); };
    es.onmessage = e => { try { lastKnownState = JSON.parse(e.data); applyState(lastKnownState); } catch {} };
    es.addEventListener('lyrics-updated', () => { fetchLyricCache(); });
    es.onerror = () => { es.close(); setTimeout(connect, reconnectDelay); reconnectDelay = Math.min(reconnectDelay * 2, 10000); };
  }
  connect();

  // ── 시계 ──
  function updateClock() {
    const d = new Date();
    $('clock').textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── 카운트다운 오버랩 위치 ──
  function positionCountdown() {
    const curBox = $('cur-box');
    const middle = $('middle');
    const cd     = $('cd-overlap');
    const mRect  = middle.getBoundingClientRect();
    const cRect  = curBox.getBoundingClientRect();
    // cur-box 하단 = middle 기준 상대 위치
    const topRelative = cRect.bottom - mRect.top;
    cd.style.top = (topRelative - cd.offsetHeight / 2) + 'px';
  }

  // ── 곡 휠 ──
  let lastSongIdx = -1, lastSongCount = 0;
  function renderSongWheel(songs, idx) {
    const track = $('song-track');
    if (idx === lastSongIdx && songs.length === lastSongCount) return;
    lastSongIdx = idx; lastSongCount = songs.length;
    track.innerHTML = '';
    songs.forEach((name, i) => {
      const d = i - idx;
      const el = document.createElement('span');
      el.className = 's-name' + (d===0?' active':d===-1?' p1':d===1?' n1':d===-2?' p2':d===2?' n2':'');
      el.textContent = name;
      if (Math.abs(d) > 2) el.style.visibility = 'hidden';
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 20;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
      positionCountdown();
    });
  }

  // ── 가사+코드 렌더 ──
  function renderLyricBlock(blockEl, tokens, fallback) {
    blockEl.innerHTML = '';
    if (!tokens || tokens.length === 0) {
      (fallback || '').split('\n').forEach(line => {
        const lineEl = document.createElement('div');
        lineEl.className = 'lyric-line';
        const span = document.createElement('span');
        span.className = 'lyric-char';
        span.textContent = line;
        lineEl.appendChild(span);
        blockEl.appendChild(lineEl);
      });
      return;
    }
    let lines = [[]];
    tokens.forEach(t => {
      if (t.type === 'br') lines.push([]);
      else lines[lines.length - 1].push(t);
    });
    while (lines.length > 1 && lines[lines.length - 1].length === 0) lines.pop();
    lines.forEach(line => {
      const allGhost = line.length > 0 && line.every(t => t.type === 'ghost');
      const lineHasChord = line.some(t => t.chord);
      const lineEl = document.createElement('div');
      lineEl.className = 'lyric-line';
      if (allGhost) {
        lineEl.style.cssText = 'flex-wrap:wrap;justify-content:flex-start;gap:6px 0;';
      }
      line.forEach(t => {
        if (allGhost && !t.chord) return;
        const charEl = document.createElement('span');
        charEl.className = t.type === 'ghost' ? 'lyric-char ghost' : 'lyric-char';
        if (allGhost) charEl.style.cssText = 'min-width:2em;margin-right:12px;';
        if (lineHasChord && !(allGhost && !t.chord)) {
          const chordEl = document.createElement('span');
          chordEl.className = t.chord ? 'chord-label' : 'chord-label chord-label-empty';
          chordEl.textContent = t.chord || '\u00A0';
          charEl.appendChild(chordEl);
        }
        if (t.type === 'char') charEl.appendChild(document.createTextNode(t.char === ' ' ? '\u00A0' : (t.char || '')));
        else if (t.type === 'ghost') charEl.appendChild(document.createTextNode(' '));
        lineEl.appendChild(charEl);
      });
      blockEl.appendChild(lineEl);
    });
  }

  // ── 코드만(간주) 그리드 렌더 ──
  // pos는 항상 8분음표 해상도로 저장됨: 분모 4 계열은 박당 2칸(pos/2=박), 분모 8 계열은
  // 박당 1칸(pos=박 그대로). divisor로 통일 계산 — 편집 화면 renderInstEditor와 동일 규칙.
  function renderInstDisplay(blockEl, instChords, barCount, beatsPerBar, beatUnit) {
    const bc = barCount || (instChords || []).length;
    const bpb = beatsPerBar || 4;
    const divisor = (beatUnit === 8) ? 1 : 2;
    const grid = document.createElement('div');
    grid.className = 'inst-disp-grid';
    for (let b = 0; b < bc; b++) {
      if (b > 0) { const div = document.createElement('div'); div.className = 'inst-disp-div'; grid.appendChild(div); }
      const barEl = document.createElement('div');
      barEl.className = 'inst-disp-bar';
      const slots = ((instChords || [])[b] || []).slice().sort((a,c) => a.pos - c.pos);
      const beatMap = {};
      slots.forEach(s => { const beat = Math.floor((s.pos || 0) / divisor); if (!beatMap[beat]) beatMap[beat] = s.name; });
      for (let beat = 0; beat < bpb; beat++) {
        const cell = document.createElement('span');
        if (beatMap[beat]) {
          cell.className = 'inst-disp-chord'; cell.textContent = beatMap[beat];
        } else {
          cell.className = 'inst-disp-dot'; cell.textContent = '·';
        }
        barEl.appendChild(cell);
      }
      grid.appendChild(barEl);
    }
    blockEl.appendChild(grid);
  }

  function renderSlide(blockEl, slide, fallback, firstLineOnly, beatsPerBar, beatUnit) {
    blockEl.innerHTML = '';
    if (slide && slide.isInstrumental) {
      const ic = slide.instChords;
      if (ic && ic.some(b => b && b.length > 0)) {
        renderInstDisplay(blockEl, ic, slide.barCount, beatsPerBar, beatUnit);
      } else {
        renderLyricBlock(blockEl, slide.tokens, fallback);
      }
    } else {
      let tokens = slide ? slide.tokens : null;
      // 다음 가사 미리보기: 첫 줄만 표시 (박스를 얇게 유지해 현재 가사 공간 확보)
      if (firstLineOnly && tokens && tokens.length > 0) {
        const brIdx = tokens.findIndex(t => t.type === 'br');
        if (brIdx > 0) tokens = tokens.slice(0, brIdx);
      }
      renderLyricBlock(blockEl, tokens, firstLineOnly ? (fallback || '').split('\n')[0] : fallback);
    }
  }

  // ── 가사 자동 맞춤: 줄이 영역보다 넓으면 그 줄만 폰트 축소 (노래방 방식) ──
  window.addEventListener('resize', () => {
    fitLyricLines($('cur-lyric-block'));
    fitLyricLines($('nxt-lyric-block'));
  });
  function fitLyricLines(blockEl) {
    if (!blockEl) return;
    const lines = [...blockEl.querySelectorAll('.lyric-line')];
    if (lines.length === 0) return;
    // 폭이 고정된 부모 컨테이너(wrap) 기준으로 측정
    const container = blockEl.parentElement || blockEl;
    const avail = container.clientWidth - 4;
    if (avail <= 0) return;
    // 기본 크기로 리셋 후, 슬라이드 전체에 적용할 공통 축소 비율 계산
    // (줄마다 따로 줄이면 같은 슬라이드 안에서 글자 크기가 제각각이 됨)
    lines.forEach(l => l.style.fontSize = '');
    const base = parseFloat(getComputedStyle(lines[0]).fontSize);
    let ratio = 1;
    lines.forEach(l => {
      const w = l.scrollWidth;
      if (w > avail) ratio = Math.min(ratio, avail / w);
    });
    const availH = container.clientHeight - 4;
    if (availH > 0 && blockEl.scrollHeight > 0) {
      ratio = Math.min(ratio, availH / blockEl.scrollHeight);
    }
    if (ratio < 1) {
      const size = Math.max(12, Math.floor(base * ratio * 0.97));
      lines.forEach(l => l.style.fontSize = size + 'px');
    }
  }

  // ── 카운트다운 ──
  let lastCdBeats = null;
  function renderCountdown(bars, bpb) {
    const el = $('cd-num');
    if (!bars || bars <= 0) {
      el.textContent = '';
      lastCdBeats = null;
      return;
    }
    // bars는 실제로 남은 비트 수 — 그대로 표시 (8,7,6...1)
    if (bars !== lastCdBeats) {
      lastCdBeats = bars;
      el.textContent = bars;
      el.classList.remove('beat-pop');
      void el.offsetWidth;
      el.classList.add('beat-pop');
    }
    positionCountdown();
  }

  // ── 상태 적용 ──
  function applyState(s) {
    // 곡 휠
    const songs = s.songs || [];
    const idx   = s.currentSongIndex ?? -1;
    renderSongWheel(songs, Math.max(0, idx));
    $('key-label').textContent = s.key || '';

    // 현재/다음 슬라이드 (곡 전체 절대 초 기준 — 섹션 첫 슬라이드 조기 전환 지원,
    // 라벨도 같은 소스로 통일해 라벨/콘텐츠 불일치 방지)
    const songName = songs[idx] || '';
    const secIdx = s.currentSectionIndexInSong ?? -1;
    const secStart = songSections[songName]?.[secIdx]?.startInSong ?? 0;
    const absSec = secStart + (s.sectionElapsedSec ?? 0);
    const curEntry = findCurrentEntry(songName, absSec);
    const curLabel = curEntry?.secName || s.currentSection || '';
    $('cur-section-label').textContent = curLabel.startsWith('#') ? '' : (curLabel || '—');
    renderSlide($('cur-lyric-block'), curEntry?.slide || null, s.lyricCue, false, curEntry?.beatsPerBar, curEntry?.beatUnit);
    fitLyricLines($('cur-lyric-block'));
    // 싱어 노트 — 슬라이드 귀속, 구버전 데이터는 섹션 노트로 폴백
    const curNote = curEntry?.slide?.singerNote || s.singerNote || '';
    $('cur-singer-note').textContent = curNote;
    $('cur-singer-note').classList.toggle('hidden', !curNote);

    // 다음 슬라이드: flat 배열 기준 바로 다음 슬라이드
    const nxtEntry = findNextEntry(songName, absSec);
    const nxtSec = s.nextSection || '';
    const nxtIsSong = s.nextSectionIsSong || nxtSec.startsWith('#');
    // flat 배열에 다음 슬라이드가 없으면 → 다음 곡 경계
    if (!nxtEntry && nxtIsSong) {
      const songName2 = s.nextSongName || nxtSec.replace(/^#/, '');
      $('nxt-section-label').textContent = '';
      $('nxt-lyric-wrap').classList.add('hidden');
      $('nxt-song-display').classList.remove('hidden');
      $('nxt-song-name').textContent = songName2;
      // 조표·박자표·BPM 미리보기 — 사전 스캔 안 됐으면 값이 비어있어 자동으로 생략됨
      const metaParts = [s.nextSongKey, s.nextSongTimeSignature, s.nextSongBpm ? Math.round(s.nextSongBpm) + ' BPM' : ''].filter(Boolean);
      $('nxt-song-meta').textContent = metaParts.join('  ·  ');
      $('nxt-singer-note').classList.add('hidden');
    } else {
      $('nxt-section-label').textContent = nxtEntry ? nxtEntry.secName : '';
      $('nxt-lyric-wrap').classList.remove('hidden');
      $('nxt-song-display').classList.add('hidden');
      renderSlide($('nxt-lyric-block'), nxtEntry?.slide || null, '', true, nxtEntry?.beatsPerBar, nxtEntry?.beatUnit);  // 첫 줄만
      fitLyricLines($('nxt-lyric-block'));
      // 다음 슬라이드의 노트 — 슬라이드 귀속, 구버전 데이터는 다음 섹션 노트로 폴백
      const nxtNote = nxtEntry?.slide?.singerNote || (nxtEntry && curEntry && nxtEntry.secName !== curEntry.secName ? (s.nextSingerNote || '') : '');
      $('nxt-singer-note').textContent = nxtNote;
      $('nxt-singer-note').classList.toggle('hidden', !nxtNote);
    }

    // 카운트다운
    renderCountdown(s.countdownBars || 0, s.beatsPerBar || 4);
  }

  // ── 더미 (?demo 또는 file:// 접속 시) ──
  if (window.location.protocol === 'file:' || new URLSearchParams(location.search).has('demo')) {
    $('offline').classList.add('hidden');
    applyState({
      currentSection: 'Chorus',
      currentSlideTokens: [
        {type:'char',char:'찬',chord:'G'},{type:'char',char:'양'},{type:'char',char:'해'},
        {type:'ghost',chord:'D/F#'},{type:'char',char:' '},
        {type:'char',char:'찬'},{type:'char',char:'양'},{type:'char',char:'해'},
        {type:'br'},
        {type:'char',char:'온',chord:'Em'},{type:'char',char:' '},{type:'char',char:'맘'},
        {type:'char',char:' '},{type:'char',char:'다',chord:'C'},{type:'char',char:'해'},
      ],
      nextSection: 'Bridge',
      nextSlideTokens: [
        {type:'char',char:'주',chord:'Am'},{type:'char',char:'님'},{type:'char',char:' '},
        {type:'char',char:'앞',chord:'F'},{type:'char',char:'에'},{type:'char',char:' '},
        {type:'char',char:'나',chord:'C'},{type:'char',char:'아'},{type:'char',char:'가'},
        {type:'br'},
        {type:'char',char:'경',chord:'G'},{type:'char',char:'배'},{type:'char',char:'해'},
      ],
      countdownBars: 6,
      beatsPerBar: 4,
      songs: ['시온의 영광', 'I Thank God', '은혜의 비'],
      currentSongIndex: 1,
      key: 'G',
      nextSongName: '은혜의 비',
      nextSongKey: 'D', nextSongTimeSignature: '4/4', nextSongBpm: 92,
    });
  }
</script>
