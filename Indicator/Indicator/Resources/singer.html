<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Indicator · Singer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14141a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #14141a;
    color: #f0f0f0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── 상단 바 ── */
  #top {
    flex-shrink: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 6px;
    gap: 4px;
  }

  #clock {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px; font-weight: 600;
    color: #555566;
    font-variant-numeric: tabular-nums;
  }

  /* 곡 휠 */
  #song-vp { width: 100%; overflow: hidden; }
  #song-track {
    display: flex;
    align-items: baseline;
    gap: 20px;
    white-space: nowrap;
    padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name {
    font-size: 10px; font-weight: 600; color: #1e1e32;
    white-space: nowrap; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name.p2 { font-size: 11px; color: #28283e; }
  .s-name.p1 { font-size: 15px; color: #36365a; }
  .s-name.active { font-size: 22px; font-weight: 800; color: #f0f0f0; }
  .s-name.n1 { font-size: 15px; color: #36365a; }
  .s-name.n2 { font-size: 11px; color: #28283e; }

  /* 키 */
  #key-label {
    font-size: 11px; font-weight: 700;
    color: #5DCAA5;
    letter-spacing: 0.04em;
  }

  /* ── 중간 영역 (현재+다음 카드) ── */
  #middle {
    flex: 1; min-height: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 0 10px 10px;
    gap: 0;
  }

  /* ── 현재 섹션 카드 ── */
  #cur-box {
    flex: 3;
    min-height: 0;
    border: 2px solid #5DCAA5;
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    margin-bottom: 0;
  }

  #cur-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 14px;
    min-width: 0;
  }

  .card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
    margin-bottom: 6px;
    gap: 8px;
    min-width: 0;
  }
  #cur-section-label {
    font-size: 13px;
    font-weight: 700;
    color: #5DCAA5;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  #cur-singer-note {
    font-size: 12px;
    font-weight: 700;
    color: #E8A840;
    text-align: right;
    flex-shrink: 1;
    min-width: 0;
    line-height: 1.3;
  }

  #cur-lyric-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    min-height: 0;
  }

  /* 가사+코드 줄별 렌더 */
  .lyric-line {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .lyric-char {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .lyric-char.ghost { min-width: 0.8em; }
  #cur-lyric-wrap .lyric-char {
    font-size: clamp(20px, 4vw, 48px);
    font-weight: 700;
    line-height: 1.35;
    color: #ffffff;
  }
  #nxt-lyric-wrap .lyric-char {
    font-size: clamp(15px, 3vw, 32px);
    font-weight: 600;
    line-height: 1.35;
    color: #555;
  }
  .chord-label {
    font-size: 15px; font-weight: 700;
    color: #5DCAA5;
    white-space: nowrap;
    line-height: 1.3;
  }
  #nxt-lyric-wrap .chord-label {
    font-size: 13px;
    color: #3d7a6a;
  }

  /* ── 카운트다운 (카드 경계에 오버랩) ── */
  #cd-overlap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    /* top은 JS로 cur-box 하단에 맞춤 */
    pointer-events: none;
  }

  #cd-num {
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 900;
    color: #5DCAA5;
    line-height: 1;
    letter-spacing: -0.04em;
    background: #14141a;
    padding: 0 10px;
  }
  #cd-num.beat-pop {
    animation: beatpop 0.18s cubic-bezier(0.2,0,0.4,1) forwards;
  }
  @keyframes beatpop {
    0%   { transform: scale(1.3); color: #fff; }
    60%  { transform: scale(0.95); color: #5DCAA5; }
    100% { transform: scale(1.0);  color: #5DCAA5; }
  }

  /* ── 다음 섹션 카드 ── */
  #nxt-box {
    flex: 2;
    min-height: 0;
    border: 1.5px solid #2a2a3a;
    border-radius: 10px;
    display: flex;
    overflow: hidden;
  }

  #nxt-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    min-width: 0;
  }

  .nxt-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
    margin-bottom: 4px;
    gap: 6px;
    min-width: 0;
  }
  #nxt-section-label {
    font-size: 11px;
    font-weight: 700;
    color: #3a3a52;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  #nxt-singer-note {
    font-size: 10px;
    font-weight: 700;
    color: #b07820;
    text-align: right;
    flex-shrink: 1;
    min-width: 0;
    line-height: 1.3;
  }

  #nxt-lyric-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    min-height: 0;
  }

  /* 다음 섹션이 곡 전환일 때 — 키컬러로 크게 */
  #nxt-song-display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 800;
    color: #5DCAA5;
    letter-spacing: -0.02em;
  }


  /* 다음 곡 표시 */
  #nxt-song-row {
    font-size: 11px;
    color: #555;
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── 오프라인 ── */
  #offline {
    position: fixed; inset: 0;
    background: rgba(14,14,20,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #888; z-index: 99;
  }
  .hidden { display: none !important; }
  .inst-disp-grid { display: flex; align-items: center; flex-wrap: wrap; gap: 0; padding: 4px 0; }
  .inst-disp-bar { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 2px 12px; min-width: 40px; gap: 2px; }
  .inst-disp-div { width: 1px; height: 36px; background: #333; margin: 0 4px; }
  .inst-disp-chord { font-size: clamp(16px,3vw,36px); color: #5DCAA5; font-weight: 700; line-height: 1.2; white-space: nowrap; }
  .inst-disp-empty { font-size: clamp(14px,2.5vw,28px); color: #333; }
</style>
</head>
<body>

<div id="offline">연결 중…</div>

<!-- 상단 바 -->
<div id="top">
  <div id="clock">--:--</div>
  <div id="song-vp"><div id="song-track"></div></div>
  <div id="key-label"></div>
</div>

<!-- 현재 + 다음 카드 -->
<div id="middle">

  <div id="cur-box">
    <div id="cur-content">
      <div class="card-top-row">
        <div id="cur-section-label">—</div>
        <div id="cur-singer-note" class="hidden"></div>
      </div>
      <div id="cur-lyric-wrap">
        <div class="lyric-block" id="cur-lyric-block"></div>
      </div>
    </div>
  </div>

  <!-- 카운트: 카드 경계에 걸쳐 표시 -->
  <div id="cd-overlap"><div id="cd-num"></div></div>

  <div id="nxt-box">
    <div id="nxt-content">
      <div class="nxt-top-row">
        <div id="nxt-section-label"></div>
        <div id="nxt-singer-note" class="hidden"></div>
      </div>
      <div id="nxt-lyric-wrap">
        <div class="lyric-block" id="nxt-lyric-block"></div>
      </div>
      <div id="nxt-song-display" class="hidden"></div>
    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);

  // ── 가사 캐시 (/edit DATA 파싱) ──
  // flat sorted slide array: { songName: [{ secName, absBar, slide }] }
  let lyricSlides = {};
  let lastKnownState = null;

  async function fetchLyricCache() {
    try {
      const html = await fetch('/edit').then(r => r.text());
      const m = html.match(/const DATA=(\[[\s\S]*?\]);/);
      if (!m) return;
      const data = JSON.parse(m[1]);
      lyricSlides = {};
      data.forEach(song => {
        const arr = [];
        (song.sections || []).forEach(sec => {
          const secStart = sec.startBar || 0;
          (sec.slides || []).forEach(slide => {
            const slRel = (secStart > 0 && slide.startBar >= secStart) ? slide.startBar - secStart : slide.startBar;
            arr.push({ secName: sec.sec, absBar: secStart + slRel, slide });
          });
        });
        arr.sort((a, b) => a.absBar - b.absBar);
        lyricSlides[song.song] = arr;
      });
      if (lastKnownState) applyState(lastKnownState);
    } catch(e) {}
  }

  function findCurrentEntry(songName, barFloat) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    let best = arr[0];
    for (const e of arr) { if (e.absBar <= barFloat) best = e; else break; }
    return best;
  }

  function findNextEntry(songName, barFloat) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    let bestIdx = 0;
    for (let i = 0; i < arr.length; i++) { if (arr[i].absBar <= barFloat) bestIdx = i; else break; }
    return arr[bestIdx + 1] || null;
  }

  function findSlide(songName, secName, barFloat, forNext) {
    const list = lyricCache[songName]?.[secName];
    if (!list || !list.length) return null;
    if (forNext) {
      const next = list.find(s => (s.startBar || 0) > barFloat) || list[0];
      return next.slides?.[0] || null;
    }
    let sec = list[0];
    for (const s of list) {
      if ((s.startBar || 0) <= barFloat) sec = s;
      else break;
    }
    if (!sec.slides || !sec.slides.length) return null;
    const secStart = sec.startBar || 0;
    const relBar = barFloat - secStart;
    let best = sec.slides[0];
    for (const sl of sec.slides) {
      const slRel = (secStart > 0 && sl.startBar >= secStart) ? sl.startBar - secStart : sl.startBar;
      if (slRel <= relBar) best = sl;
      else break;
    }
    return best;
  }
  function findTokens(songName, secName, barFloat, useFirst) {
    const sl = findSlide(songName, secName, barFloat, useFirst);
    return sl?.tokens?.length ? sl.tokens : null;
  }

  // 다음 슬라이드: ① 같은 섹션 occurrence 내 다음 슬라이드 → ② 같은 섹션명 다음 occurrence → ③ 다음 섹션
  function findNextSlide(songName, secName, barFloat, nextSecName) {
    const list = lyricCache[songName]?.[secName];
    if (list && list.length) {
      let secIdx = 0;
      let sec = list[0];
      for (let i = 0; i < list.length; i++) {
        if ((list[i].startBar || 0) <= barFloat) { sec = list[i]; secIdx = i; }
        else break;
      }
      // ① 같은 occurrence 내 다음 슬라이드
      if (sec.slides && sec.slides.length > 1) {
        const secStart = sec.startBar || 0;
        const relBar = barFloat - secStart;
        let bestIdx = 0;
        for (let i = 0; i < sec.slides.length; i++) {
          const sl = sec.slides[i];
          const slRel = (secStart > 0 && sl.startBar >= secStart) ? sl.startBar - secStart : sl.startBar;
          if (slRel <= relBar) bestIdx = i;
          else break;
        }
        if (bestIdx + 1 < sec.slides.length) {
          return { slide: sec.slides[bestIdx + 1], sec: secName };
        }
      }
      // ② 같은 섹션명 다음 occurrence
      if (secIdx + 1 < list.length) {
        return { slide: list[secIdx + 1].slides?.[0] || null, sec: secName };
      }
    }
    // ③ 다음 섹션
    if (nextSecName) {
      const nxtList = lyricCache[songName]?.[nextSecName];
      if (nxtList && nxtList.length) {
        return { slide: nxtList[0].slides?.[0] || null, sec: nextSecName };
      }
    }
    return { slide: null, sec: nextSecName || '' };
  }

  fetchLyricCache();

  // ── SSE ──
  let reconnectDelay = 1000;
  function connect() {
    const es = new EventSource('/events');
    es.onopen = () => { reconnectDelay = 1000; $('offline').classList.add('hidden'); fetchLyricCache(); };
    es.onmessage = e => { try { lastKnownState = JSON.parse(e.data); applyState(lastKnownState); } catch {} };
    es.addEventListener('lyrics-updated', () => { fetchLyricCache(); });
    es.onerror = () => { es.close(); setTimeout(connect, reconnectDelay); reconnectDelay = Math.min(reconnectDelay * 2, 10000); };
  }
  connect();

  // ── 시계 ──
  function updateClock() {
    const d = new Date();
    $('clock').textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── 카운트다운 오버랩 위치 ──
  function positionCountdown() {
    const curBox = $('cur-box');
    const middle = $('middle');
    const cd     = $('cd-overlap');
    const mRect  = middle.getBoundingClientRect();
    const cRect  = curBox.getBoundingClientRect();
    // cur-box 하단 = middle 기준 상대 위치
    const topRelative = cRect.bottom - mRect.top;
    cd.style.top = (topRelative - cd.offsetHeight / 2) + 'px';
  }

  // ── 곡 휠 ──
  let lastSongIdx = -1, lastSongCount = 0;
  function renderSongWheel(songs, idx) {
    const track = $('song-track');
    if (idx === lastSongIdx && songs.length === lastSongCount) return;
    lastSongIdx = idx; lastSongCount = songs.length;
    track.innerHTML = '';
    songs.forEach((name, i) => {
      const d = i - idx;
      const el = document.createElement('span');
      el.className = 's-name' + (d===0?' active':d===-1?' p1':d===1?' n1':d===-2?' p2':d===2?' n2':'');
      el.textContent = name;
      if (Math.abs(d) > 2) el.style.visibility = 'hidden';
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 20;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
      positionCountdown();
    });
  }

  // ── 가사+코드 렌더 ──
  function renderLyricBlock(blockEl, tokens, fallback) {
    blockEl.innerHTML = '';
    if (!tokens || tokens.length === 0) {
      (fallback || '').split('\n').forEach(line => {
        const lineEl = document.createElement('div');
        lineEl.className = 'lyric-line';
        const span = document.createElement('span');
        span.className = 'lyric-char';
        span.textContent = line;
        lineEl.appendChild(span);
        blockEl.appendChild(lineEl);
      });
      return;
    }
    let lines = [[]];
    tokens.forEach(t => {
      if (t.type === 'br') lines.push([]);
      else lines[lines.length - 1].push(t);
    });
    while (lines.length > 1 && lines[lines.length - 1].length === 0) lines.pop();
    lines.forEach(line => {
      const allGhost = line.length > 0 && line.every(t => t.type === 'ghost');
      const lineEl = document.createElement('div');
      lineEl.className = 'lyric-line';
      if (allGhost) {
        lineEl.style.cssText = 'flex-wrap:wrap;justify-content:flex-start;gap:6px 0;';
      }
      line.forEach(t => {
        if (allGhost && !t.chord) return;
        const charEl = document.createElement('span');
        charEl.className = t.type === 'ghost' ? 'lyric-char ghost' : 'lyric-char';
        if (allGhost) charEl.style.cssText = 'min-width:2em;margin-right:12px;';
        if (t.chord) {
          const chordEl = document.createElement('span');
          chordEl.className = 'chord-label';
          chordEl.textContent = t.chord;
          charEl.appendChild(chordEl);
        }
        if (t.type === 'char') charEl.appendChild(document.createTextNode(t.char === ' ' ? '\u00A0' : (t.char || '')));
        else if (t.type === 'ghost') charEl.appendChild(document.createTextNode(' '));
        lineEl.appendChild(charEl);
      });
      blockEl.appendChild(lineEl);
    });
  }

  // ── 간주 코드 그리드 렌더 ──
  function renderInstDisplay(blockEl, instChords, barCount) {
    const bc = barCount || (instChords || []).length;
    const grid = document.createElement('div');
    grid.className = 'inst-disp-grid';
    for (let b = 0; b < bc; b++) {
      if (b > 0) { const div = document.createElement('div'); div.className = 'inst-disp-div'; grid.appendChild(div); }
      const barEl = document.createElement('div');
      barEl.className = 'inst-disp-bar';
      const slots = ((instChords || [])[b] || []).slice().sort((a,c) => a.pos - c.pos);
      if (slots.length === 0) {
        const emp = document.createElement('span'); emp.className = 'inst-disp-empty'; emp.textContent = '—'; barEl.appendChild(emp);
      } else {
        slots.forEach(s => {
          const c = document.createElement('span'); c.className = 'inst-disp-chord'; c.textContent = s.name; barEl.appendChild(c);
        });
      }
      grid.appendChild(barEl);
    }
    blockEl.appendChild(grid);
  }

  function renderSlide(blockEl, slide, fallback) {
    blockEl.innerHTML = '';
    if (slide && slide.isInstrumental) {
      const ic = slide.instChords;
      if (ic && ic.some(b => b && b.length > 0)) {
        renderInstDisplay(blockEl, ic, slide.barCount);
      } else {
        renderLyricBlock(blockEl, slide.tokens, fallback);
      }
    } else {
      renderLyricBlock(blockEl, slide ? slide.tokens : null, fallback);
    }
  }

  // ── 카운트다운 ──
  let lastCdBeats = null;
  function renderCountdown(bars, bpb) {
    const el = $('cd-num');
    if (!bars || bars <= 0) {
      el.textContent = '';
      lastCdBeats = null;
      return;
    }
    // bars는 실제로 남은 비트 수 — 그대로 표시 (8,7,6...1)
    if (bars !== lastCdBeats) {
      lastCdBeats = bars;
      el.textContent = bars;
      el.classList.remove('beat-pop');
      void el.offsetWidth;
      el.classList.add('beat-pop');
    }
    positionCountdown();
  }

  // ── 상태 적용 ──
  function applyState(s) {
    // 곡 휠
    const songs = s.songs || [];
    const idx   = s.currentSongIndex ?? -1;
    renderSongWheel(songs, Math.max(0, idx));
    $('key-label').textContent = s.key || '';

    // 현재/다음 슬라이드 (flat 순서 기준)
    const sec = s.currentSection || '';
    const songName = songs[idx] || '';
    const barFloat = s.currentBarFloat ?? 0;
    $('cur-section-label').textContent = sec.startsWith('#') ? '' : (sec || '—');
    const curEntry = findCurrentEntry(songName, barFloat);
    renderSlide($('cur-lyric-block'), curEntry?.slide || null, s.lyricCue);
    const curNote = s.singerNote || '';
    $('cur-singer-note').textContent = curNote;
    $('cur-singer-note').classList.toggle('hidden', !curNote);

    // 다음 슬라이드: flat 배열 기준 바로 다음 슬라이드
    const nxtEntry = findNextEntry(songName, barFloat);
    const nxtSec = s.nextSection || '';
    const nxtIsSong = s.nextSectionIsSong || nxtSec.startsWith('#');
    // flat 배열에 다음 슬라이드가 없으면 → 다음 곡 경계
    if (!nxtEntry && nxtIsSong) {
      const songName2 = s.nextSongName || nxtSec.replace(/^#/, '');
      $('nxt-section-label').textContent = '';
      $('nxt-lyric-wrap').classList.add('hidden');
      $('nxt-song-display').classList.remove('hidden');
      $('nxt-song-display').textContent = songName2;
    } else {
      $('nxt-section-label').textContent = nxtEntry ? nxtEntry.secName : '';
      $('nxt-lyric-wrap').classList.remove('hidden');
      $('nxt-song-display').classList.add('hidden');
      renderSlide($('nxt-lyric-block'), nxtEntry?.slide || null, '');
    }
    $('nxt-singer-note').classList.add('hidden');

    // 카운트다운
    renderCountdown(s.countdownBars || 0, s.beatsPerBar || 4);
  }
