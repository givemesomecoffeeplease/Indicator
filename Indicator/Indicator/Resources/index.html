<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Indicator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #14141a;
    --surface: #1e1e28;
    --green:   #5DCAA5;
    --white:   #f0f0f0;
    --gray:    #555566;
    --dim:     #33333f;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP: Setlist ── */
  #setlist {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 14px 20px 10px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #setlist::-webkit-scrollbar { display: none; }

  .song-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--gray);
    background: var(--dim);
    transition: all .3s;
    letter-spacing: 0.02em;
  }
  .song-chip.active { color: var(--white); background: var(--green); }

  /* ── MIDDLE ── */
  #middle {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    min-height: 0;
  }

  .section-block { display: flex; flex-direction: column; gap: 10px; }
  #current-block { align-items: flex-start; }
  #next-block    { align-items: flex-end; }

  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
  }

  #current-name {
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  #next-name {
    font-size: clamp(28px, 6vw, 60px);
    font-weight: 700;
    color: #44445a;
    line-height: 1.05;
    text-align: right;
    letter-spacing: -0.02em;
  }

  /* Progress bar */
  #progress-wrap {
    width: 100%;
    height: 5px;
    background: var(--dim);
    border-radius: 3px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    width: 0%;
    /* No CSS transition — JS drives this via rAF */
  }

  /* ── Countdown ── */
  #countdown-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: clamp(80px, 18vw, 200px);
    height: clamp(80px, 18vw, 200px);
  }

  /* Pulse ring behind the number */
  #countdown-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(93,202,165,0.08);
    transform: scale(0);
    opacity: 0;
  }
  #countdown-ring.pulse {
    animation: ring-pulse 0.35s ease-out forwards;
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.4); opacity: 0.7; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  #countdown {
    position: relative;
    z-index: 1;
    font-size: clamp(64px, 16vw, 180px);
    font-weight: 900;
    color: var(--green);
    letter-spacing: -0.04em;
    line-height: 1;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity .15s, transform .15s;
    text-shadow: 0 0 40px rgba(93,202,165,0.5);
  }
  #countdown.visible {
    opacity: 1;
    transform: scale(1);
  }
  #countdown.beat {
    animation: beat-pop 0.2s ease-out forwards;
  }
  @keyframes beat-pop {
    0%   { transform: scale(1.3); color: #fff; text-shadow: 0 0 60px rgba(93,202,165,1); }
    100% { transform: scale(1.0); color: var(--green); text-shadow: 0 0 40px rgba(93,202,165,0.5); }
  }

  /* ── BOTTOM: Section timeline ── */
  #timeline {
    padding: 10px 20px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #timeline::-webkit-scrollbar { display: none; }

  .sec-block {
    flex: 1;
    min-width: 48px;
    max-width: 120px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--dim);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    color: var(--gray);
    white-space: nowrap;
    transition: all .3s;
  }
  .sec-block.active { background: var(--green); color: #0d0d12; }

  /* Offline overlay */
  #offline {
    position: fixed; inset: 0;
    background: rgba(20,20,26,.92);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--gray);
    letter-spacing: 0.04em;
    z-index: 99;
  }
  #offline.hidden { display: none; }
</style>
</head>
<body>

<div id="offline">연결 중...</div>

<div id="setlist"></div>

<div id="middle">
  <div class="section-block" id="current-block">
    <span class="label">현재</span>
    <div id="current-name">--</div>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
  </div>

  <div id="countdown-wrap">
    <div id="countdown-ring"></div>
    <div id="countdown">1</div>
  </div>

  <div class="section-block" id="next-block">
    <span class="label">다음</span>
    <div id="next-name">--</div>
  </div>
</div>

<div id="timeline"></div>

<script>
  const $ = id => document.getElementById(id);

  // ── SSE ──
  let es, reconnectDelay = 1000;

  function connect() {
    es = new EventSource('/events');
    es.onopen = () => { $('offline').classList.add('hidden'); reconnectDelay = 1000; };
    es.onmessage = e => { try { applyState(JSON.parse(e.data)); } catch {} };
    es.onerror = () => {
      $('offline').classList.remove('hidden');
      es.close();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 10000);
    };
  }

  // ── Smooth progress ──
  let prog = { from: 0, to: 0, rate: 0, lastTs: 0, rafId: null };

  function startProgressRaf(progress, bpm, beatsPerBar, sectionLengthBars) {
    const now = performance.now();

    // Exact rate from section length: progress per second = 1 / sectionDurationSeconds
    if (sectionLengthBars > 0 && bpm > 0) {
      const sectionBeats = sectionLengthBars * beatsPerBar;
      const sectionSecs  = sectionBeats / (bpm / 60);
      prog.rate = 1.0 / sectionSecs;
    }

    prog.from   = progress;
    prog.lastTs = now;

    if (prog.rafId) cancelAnimationFrame(prog.rafId);
    tick(now);
  }

  function tick(startTs) {
    prog.rafId = requestAnimationFrame(ts => {
      const dt   = (ts - prog.lastTs) / 1000;
      const est  = Math.min(1, prog.from + prog.rate * (ts - startTs) / 1000);
      $('progress-fill').style.width = (est * 100).toFixed(2) + '%';
      if (est < 1) tick(startTs);
    });
  }

  // ── Countdown beat animation ──
  let lastCountdownVal = null;

  function showCountdown(val) {
    const cd   = $('countdown');
    const ring = $('countdown-ring');

    if (val !== lastCountdownVal) {
      lastCountdownVal = val;
      // Trigger beat pop
      cd.classList.remove('beat');
      ring.classList.remove('pulse');
      void cd.offsetWidth; // reflow
      cd.textContent = val;
      cd.classList.add('visible', 'beat');
      ring.classList.add('pulse');
    }
  }

  function hideCountdown() {
    $('countdown').classList.remove('visible', 'beat');
    lastCountdownVal = null;
  }

  // ── State application ──
  function applyState(s) {
    // Setlist chips
    const sl = $('setlist');
    if (sl.children.length !== s.songs.length) {
      sl.innerHTML = s.songs.map((n, i) =>
        `<span class="song-chip" data-i="${i}">${n}</span>`).join('');
    }
    sl.querySelectorAll('.song-chip').forEach(el =>
      el.classList.toggle('active', +el.dataset.i === s.currentSongIndex));
    const activeChip = sl.querySelector('.song-chip.active');
    if (activeChip) activeChip.scrollIntoView({ inline: 'center', behavior: 'smooth' });

    // Section names
    $('current-name').textContent = s.currentSection || '--';
    $('next-name').textContent    = s.nextSection    || '';

    // Smooth progress
    startProgressRaf(s.sectionProgress, s.bpm || 120, s.beatsPerBar || 4, s.sectionLengthBars || 0);

    // Countdown
    if (s.countdownBars != null && s.countdownBars > 0) {
      showCountdown(s.countdownBars);
    } else {
      hideCountdown();
    }

    // Timeline
    const tl   = $('timeline');
    const secs = s.currentSongSections || [];
    if (tl.children.length !== secs.length) {
      tl.innerHTML = secs.map((n, i) =>
        `<div class="sec-block" data-i="${i}">${n}</div>`).join('');
    }
    tl.querySelectorAll('.sec-block').forEach(el =>
      el.classList.toggle('active', +el.dataset.i === s.currentSectionIndexInSong));
    const activeSec = tl.querySelector('.sec-block.active');
    if (activeSec) activeSec.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }

  connect();
</script>
</body>
</html>
