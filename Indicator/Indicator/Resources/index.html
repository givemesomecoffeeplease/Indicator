<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #14141a;
    color: #f0f0f0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP ── */
  #top {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 5px;
    flex-shrink: 0;
    gap: 5px;
  }
  #clock {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px; font-weight: 600;
    color: #555566;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }

  /* 곡 휠 */
  #song-vp { width: 100%; overflow: hidden; }
  #song-track {
    display: flex;
    align-items: baseline;
    gap: 24px;
    white-space: nowrap;
    padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name {
    font-size: 11px; font-weight: 600; color: #1e1e32;
    white-space: nowrap; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name.p2 { font-size: 13px; color: #28283e; }
  .s-name.p1 { font-size: 18px; color: #36365a; }
  .s-name.active { font-size: 34px; font-weight: 800; color: #f0f0f0; }
  .s-name.n1 { font-size: 18px; color: #36365a; }
  .s-name.n2 { font-size: 13px; color: #28283e; }

  /* 메타 */
  #meta-row { display: flex; align-items: center; gap: 7px; }
  .meta-pill {
    font-size: 11px; font-weight: 700;
    color: #888899; background: #1e1e28;
    padding: 2px 10px; border-radius: 20px;
  }

  /* ── CONTENT ROW (main + lyric panel) ── */
  #content-row {
    flex: 1; min-height: 0;
    display: flex;
    flex-direction: row;
  }

  /* ── MAIN (지금/다음 섹션, 2/3) ── */
  #main {
    flex: 2; min-height: 0; min-width: 0;
    display: grid;
    grid-template-columns: 1fr 64px 1fr;
    grid-template-rows:
      20px   /* row 1: sec-label */
      1fr    /* row 2: section name */
      auto   /* row 3: meta (key/BPM/ts) */
      auto   /* row 4: lyric */
      auto   /* row 5: note */
      60px   /* row 6: chord + progress */
    ;
    row-gap: 8px;
    align-items: center;
    justify-items: center;
    padding: 4px 0;
  }
  /* 컬럼 중앙 구분선 — 모든 행에 걸침 */
  #col-center-cell {
    grid-column: 2;
    grid-row: 1 / -1;
    align-self: stretch;
  }
  /* 지금/다음 각 행 배치 */
  .sec-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #555566;
  }
  #cur-label { grid-column: 1; grid-row: 1; }
  #nxt-label { grid-column: 3; grid-row: 1; }

  #cur-name {
    grid-column: 1; grid-row: 2;
    font-size: clamp(26px, 5.5vw, 44px);
    font-weight: 800; color: #f0f0f0;
    line-height: 1; letter-spacing: -0.02em;
    text-align: center; padding: 0 10px;
  }
  #nxt-name {
    grid-column: 3; grid-row: 2;
    font-size: clamp(20px, 4.5vw, 34px);
    font-weight: 800; color: #44445a;
    line-height: 1; letter-spacing: -0.02em;
    text-align: center; padding: 0 10px;
  }
  .lyric {
    font-size: 15px; font-style: italic;
    line-height: 1.3; text-align: center;
    padding: 0 10px;
  }
  /* row 3: 메타 필 */
  .col-meta {
    display: flex; gap: 5px; align-items: center; justify-content: center;
    flex-wrap: wrap;
  }
  #cur-meta { grid-column: 1; grid-row: 3; }
  #nxt-meta { grid-column: 3; grid-row: 3; }
  .meta-sm {
    font-size: 9px; font-weight: 700;
    color: #555566; background: #1e1e28;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.04em;
    display: none; /* JS가 값 있으면 표시 */
  }
  .meta-sm.vis { display: block; }

  #cur-lyric { grid-column: 1; grid-row: 4; color: #888899; }
  #nxt-lyric { grid-column: 3; grid-row: 4; color: #55556a; }

  .note {
    display: flex; align-items: flex-start;
    gap: 4px; font-size: 10px;
    color: #E8A840; line-height: 1.3;
    text-align: left; padding: 0 10px;
  }
  .note.hidden { display: none; }
  .ndot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #E8A840; flex-shrink: 0; margin-top: 3px;
  }
  #cur-note-wrap { grid-column: 1; grid-row: 5; }
  #nxt-note-wrap { grid-column: 3; grid-row: 5; }

  /* row 6: chord + progress (지금 컬럼 전용) */
  #bottom-col {
    grid-column: 1;
    grid-row: 6;
    position: relative;
    align-self: stretch;
    width: 100%;
  }

  /* 진행률 바 — 항상 하단 고정 */
  #progress-wrap {
    position: absolute; bottom: 8px; left: 14px; right: 14px;
    height: 3px; background: #2a2a36;
    border-radius: 2px; overflow: hidden;
  }
  #progress-fill {
    height: 100%; width: 0%;
    background: #5DCAA5; border-radius: 2px;
  }

  /* 카운트다운 */
  #col-center-cell {
    display: flex; align-items: stretch;
  }
  #col-center {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  #divider { width: 1px; height: 80%; background: #2a2a36; transition: opacity 0.2s; }
  #cd-wrap {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  #cd-wrap.visible { opacity: 1; }
  #cd-wrap.visible ~ #divider { opacity: 0; }
  #cd-num {
    font-size: clamp(44px, 10vw, 72px);
    font-weight: 900; color: #5DCAA5;
    line-height: 1; letter-spacing: -0.04em;
  }
  #cd-num.beat-pop {
    animation: beatpop 0.18s cubic-bezier(0.2,0,0.4,1) forwards;
  }
  @keyframes beatpop {
    0%   { transform: scale(1.45); color: #fff; }
    60%  { transform: scale(0.95); color: #5DCAA5; }
    100% { transform: scale(1.0);  color: #5DCAA5; }
  }

  /* 섹션 전환 애니메이션 */
  .sec-fade {
    animation: secFade 0.3s ease forwards;
  }
  @keyframes secFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BOTTOM: 섹션 휠 ── */
  #tl-vp { overflow: hidden; padding: 4px 0 10px; flex-shrink: 0; }
  #tl-track {
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .sb {
    flex-shrink: 0; padding: 6px 12px; border-radius: 7px;
    font-size: 10px; font-weight: 700;
    color: #555566; background: #2a2a36;
    white-space: nowrap;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .sb.done     { background: #1a1a24; color: #2a2a3a; }
  .sb.active   { background: #5DCAA5; color: #0d0d12; font-size: 11px; padding: 7px 16px; }
  .sb.upcoming { color: #888899; }

  /* ── LYRIC PANEL (오른쪽 1/3) ── */
  #lyric-panel {
    flex: 1; min-height: 0; min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 16px 16px 0;
    border-left: 1px solid #2a2a36;
  }
  #lyric-panel-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #555566; margin-bottom: 8px;
  }
  #lyric-panel-text {
    font-size: clamp(13px, 2.2vw, 20px);
    font-weight: 600;
    color: #888899;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  #lyric-panel-chords {
    position: relative;
    min-height: 18px;
    margin-bottom: 4px;
  }
  .lp-chord {
    font-size: 11px; font-weight: 700;
    color: #5DCAA5;
    position: absolute;
    white-space: nowrap;
  }

  /* 오프라인 오버레이 */
  #offline {
    position: fixed; inset: 0;
    background: rgba(20,20,26,.92);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #555566;
    letter-spacing: 0.04em; z-index: 99;
  }
  #offline.hidden { display: none; }
</style>
</head>
<body>

<div id="offline">연결 중...</div>

<div id="top">
  <div id="clock"></div>
  <div id="song-vp"><div id="song-track"></div></div>
  <div id="meta-row">
    <div class="meta-pill" id="key-pill">--</div>
    <div class="meta-pill" id="ts-pill">4/4</div>
    <div class="meta-pill" id="bpm-pill">-- BPM</div>
  </div>
</div>

<div id="content-row">

  <div id="lyric-panel">
    <div id="lyric-panel-chords"></div>
    <div id="lyric-panel-text"></div>
  </div>

  <div id="main">
    <div class="sec-label" id="cur-label">지금</div>
    <div id="col-center-cell">
      <div id="col-center">
        <div id="divider"></div>
        <div id="cd-wrap"><div id="cd-num">--</div></div>
      </div>
    </div>
    <div class="sec-label" id="nxt-label">다음</div>

    <div id="cur-name">--</div>
    <div id="nxt-name">--</div>

    <div class="col-meta" id="cur-meta">
      <span class="meta-sm" id="cur-key-sm"></span>
      <span class="meta-sm" id="cur-ts-sm"></span>
      <span class="meta-sm" id="cur-bpm-sm"></span>
    </div>
    <div class="col-meta" id="nxt-meta">
      <span class="meta-sm" id="nxt-key-sm"></span>
      <span class="meta-sm" id="nxt-ts-sm"></span>
      <span class="meta-sm" id="nxt-bpm-sm"></span>
    </div>

    <div class="lyric" id="cur-lyric"></div>
    <div class="lyric" id="nxt-lyric"></div>

    <div class="note hidden" id="cur-note-wrap"><div class="ndot"></div><span id="cur-note"></span></div>
    <div class="note hidden" id="nxt-note-wrap"><div class="ndot"></div><span id="nxt-note"></span></div>

    <div id="bottom-col">
      <div id="progress-wrap"><div id="progress-fill"></div></div>
    </div>
  </div>


</div>

<div id="tl-vp"><div id="tl-track"></div></div>

<script>
  const $ = id => document.getElementById(id);

  // ── 시계 ──
  function updateClock() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    $('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── SSE ──
  let es, reconnectDelay = 1000;
  function connect() {
    es = new EventSource('/events');
    es.onopen = () => { $('offline').classList.add('hidden'); reconnectDelay = 1000; };
    es.onmessage = e => { try { applyState(JSON.parse(e.data)); } catch {} };
    es.onerror = () => {
      $('offline').classList.remove('hidden');
      es.close();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 10000);
    };
  }

  // ── 진행률 RAF ──
  // RAF는 섹션이 바뀌거나 재생 시작될 때만 재시작.
  // SSE 업데이트는 rate(속도)만 보정, 애니메이션은 건드리지 않음.
  let prog = { rafId: null, rate: 0, startTs: 0, startVal: 0, isPlaying: false, section: '' };

  function updateProgress(progress, bpm, beatsPerBar, sectionLengthBars, isPlaying, section) {
    const wasPlaying   = prog.isPlaying;
    const secChanged   = section !== prog.section;
    prog.isPlaying     = isPlaying;
    prog.section       = section;

    // 속도 보정 (매 SSE마다 업데이트)
    if (sectionLengthBars > 0 && bpm > 0) {
      const secs = (sectionLengthBars * beatsPerBar) / (bpm / 60);
      prog.rate = 1.0 / secs;
    }

    if (!isPlaying) {
      if (prog.rafId) { cancelAnimationFrame(prog.rafId); prog.rafId = null; }
      $('progress-fill').style.width = (progress * 100).toFixed(2) + '%';
      return;
    }

    // 재생 시작 or 섹션 전환 시에만 RAF 리셋
    if (!wasPlaying || secChanged || !prog.rafId) {
      if (prog.rafId) { cancelAnimationFrame(prog.rafId); prog.rafId = null; }
      prog.startVal = progress;
      prog.startTs  = performance.now();
      rafLoop();
    }
  }

  function rafLoop() {
    prog.rafId = requestAnimationFrame(() => {
      const elapsed = (performance.now() - prog.startTs) / 1000;
      const est = Math.min(1, prog.startVal + prog.rate * elapsed);
      $('progress-fill').style.width = (est * 100).toFixed(2) + '%';
      if (est < 1 && prog.isPlaying) rafLoop();
      else prog.rafId = null;
    });
  }

  // ── 카운트다운 ──
  let lastCD = null;
  function showCountdown(val) {
    if (val === lastCD) return;
    lastCD = val;
    const el = $('cd-num');
    el.textContent = val;
    el.classList.remove('beat-pop');
    void el.offsetWidth;
    el.classList.add('beat-pop');
    $('cd-wrap').classList.add('visible');
  }
  function hideCountdown() {
    $('cd-wrap').classList.remove('visible');
    lastCD = null;
  }

  // ── 곡 휠 ──
  let lastSongIdx = -1, lastSongCount = 0;
  function renderSongWheel(songs, idx) {
    const track = $('song-track');
    track.innerHTML = '';
    songs.forEach((name, i) => {
      const d = i - idx;
      const el = document.createElement('span');
      el.className = 's-name' + (d===0?' active':d===-1?' p1':d===1?' n1':d===-2?' p2':d===2?' n2':'');
      el.textContent = name;
      if (Math.abs(d) > 2) el.style.visibility = 'hidden';
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 24;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
    });
  }

  // ── 섹션 타임라인 휠 ──
  let lastSecIdx = -1, lastSecCount = 0;
  function renderTimeline(secs, idx) {
    const track = $('tl-track');
    track.innerHTML = '';
    secs.forEach((name, i) => {
      const el = document.createElement('div');
      el.className = 'sb' + (i < idx ? ' done' : i === idx ? ' active' : ' upcoming');
      el.textContent = name;
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      if (!ch[idx]) return;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 6;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
    });
  }

  // ── 섹션 이름 전환 애니메이션 ──
  function animText(id, text) {
    const el = $(id);
    if (el.textContent === text) return;
    el.classList.remove('sec-fade');
    void el.offsetWidth;
    el.textContent = text;
    el.classList.add('sec-fade');
  }

  // ── 상태 적용 ──
  function applyState(s) {
    // 곡 휠
    const songs = s.songs || [];
    const songIdx = s.currentSongIndex ?? -1;
    if (songIdx !== lastSongIdx || songs.length !== lastSongCount) {
      renderSongWheel(songs, songIdx);
      lastSongIdx = songIdx; lastSongCount = songs.length;
    }

    // 메타 (상단)
    const bpmStr = Math.round(s.bpm || 0) + ' BPM';
    const tsStr  = s.timeSignature || ((s.beatsPerBar || 4) + '/4');
    const keyStr = s.key || '';
    $('bpm-pill').textContent = bpmStr;
    $('ts-pill').textContent  = tsStr;
    $('key-pill').textContent = keyStr || '--';

    // 메타 (지금/다음 섹션 아래 소형 필) — 곡 이름일 때만 표시
    function setMetaSm(prefix, show, kStr, tStr, bStr) {
      const k = kStr !== undefined ? kStr : keyStr;
      const t = tStr !== undefined ? tStr : tsStr;
      const b = bStr !== undefined ? (bStr ? Math.round(bStr) + ' BPM' : '') : bpmStr;
      [prefix+'-key-sm', prefix+'-ts-sm', prefix+'-bpm-sm'].forEach((id, i) => {
        const el = $(id);
        el.textContent = show ? [k, t, b][i] : '';
        el.classList.toggle('vis', show && !![k, t, b][i]);
      });
    }
    const curIsSong = songs.includes(s.currentSection || '');
    const nxtIsSong = s.nextSectionIsSong || songs.includes(s.nextSection || '');
    setMetaSm('cur', curIsSong);
    setMetaSm('nxt', nxtIsSong);

    // 현재/다음 섹션
    animText('cur-name', s.currentSection || '--');
    animText('nxt-name', s.nextSection    || '--');

    // 가사 큐
    $('cur-lyric').textContent = s.lyricCue     || '';
    $('nxt-lyric').textContent = s.nextLyricCue || '';

    // 노트
    const curNote = s.note || '';
    $('cur-note').textContent = curNote;
    $('cur-note-wrap').classList.toggle('hidden', !curNote);

    const nxtNote = s.nextNote || '';
    $('nxt-note').textContent = nxtNote;
    $('nxt-note-wrap').classList.toggle('hidden', !nxtNote);

    // 진행률
    updateProgress(s.sectionProgress || 0, s.bpm || 120, s.beatsPerBar || 4, s.sectionLengthBars || 0, s.isPlaying, s.currentSection || '');

    // 카운트다운
    if (s.countdownBars != null && s.countdownBars > 0) {
      showCountdown(s.countdownBars);
    } else {
      hideCountdown();
    }

    // 가사 패널
    renderLyricPanel(s.currentSlideTokens, s.lyricCue);

    // 타임라인 휠
    const secs = s.currentSongSections || [];
    const secIdx = s.currentSectionIndexInSong ?? -1;
    if (secIdx !== lastSecIdx || secs.length !== lastSecCount) {
      renderTimeline(secs, secIdx);
      lastSecIdx = secIdx; lastSecCount = secs.length;
    }
  }


  // ── 가사 패널 렌더 ──
  function renderLyricPanel(tokens, fallbackCue) {
    const chordsEl = $('lyric-panel-chords');
    const textEl   = $('lyric-panel-text');
    chordsEl.innerHTML = '';

    if (tokens && tokens.length > 0) {
      let text = '';
      const chordPositions = [];
      tokens.forEach(t => {
        if (t.type === 'br') { text += '\n'; }
        else if (t.type === 'char' || t.type === 'ghost') {
          if (t.chord) chordPositions.push({ charIdx: text.length, chord: t.chord });
          if (t.type === 'char') text += t.char || '';
        }
      });
      textEl.textContent = text;
      const firstLineLen = text.indexOf('\n') >= 0 ? text.indexOf('\n') : text.length;
      chordPositions.forEach(({ charIdx, chord }) => {
        const span = document.createElement('span');
        span.className = 'lp-chord';
        span.textContent = chord;
        span.style.left = firstLineLen > 0 ? `${(charIdx / firstLineLen) * 100}%` : '0%';
        chordsEl.appendChild(span);
      });
    } else {
      textEl.textContent = fallbackCue || '';
    }
  }

  // ── 더미 데이터 (브라우저 직접 열기용) ──
  if (window.location.protocol === 'file:') {
    $('offline').classList.add('hidden');
    applyState({
      songs: ['은혜', '찬양해', '주님만', '할렐루야', '영광'],
      currentSongIndex: 1,
      currentSection: 'Chorus',
      nextSection: 'Bridge',
      sectionProgress: 0.4,
      countdownBars: 3,
      currentSongSections: ['Intro','Verse 1','Pre-Ch','Chorus','Verse 2','Pre-Ch 2','Chorus 2','Bridge','Chorus 3','Outro'],
      currentSectionIndexInSong: 3,
      isPlaying: true,
      bpm: 120,
      beatsPerBar: 4,
      sectionLengthBars: 8,
      key: 'G',
      lyricCue: '찬양해 찬양해\n온 맘 다해',
      nextLyricCue: '주님 앞에 나아가',
      note: '건반 오른손만, 드럼 빌드업 3마디 전',
      nextNote: '다이나믹 내리고 시작',
      chords: ['C', 'G/B', 'Am', 'C/G', 'Dm7', 'G7sus4', 'C', 'Fmaj7'],
      currentChordIndex: 2
    });
  } else {
    connect();
  }
</script>
</body>
