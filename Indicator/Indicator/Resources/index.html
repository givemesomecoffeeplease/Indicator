<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #14141a;
    color: #f0f0f0;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP ── */
  #top {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 5px;
    flex-shrink: 0;
    gap: 5px;
  }
  #clock {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 11px; font-weight: 600;
    color: #555566;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }

  /* 곡 휠 */
  #song-vp { width: 100%; overflow: hidden; }
  #song-track {
    display: flex;
    align-items: baseline;
    gap: 24px;
    white-space: nowrap;
    padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name {
    font-size: 11px; font-weight: 600; color: #1e1e32;
    white-space: nowrap; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .s-name.p2 { font-size: 13px; color: #28283e; }
  .s-name.p1 { font-size: 18px; color: #36365a; }
  .s-name.active { font-size: 34px; font-weight: 800; color: #f0f0f0; }
  .s-name.n1 { font-size: 18px; color: #36365a; }
  .s-name.n2 { font-size: 13px; color: #28283e; }

  /* 메타 */
  #meta-row { display: flex; align-items: center; gap: 7px; }
  .meta-pill {
    font-size: 11px; font-weight: 700;
    color: #888899; background: #1e1e28;
    padding: 2px 10px; border-radius: 20px;
  }

  /* ── MAIN: 지금/다음 2컬럼 ── */
  #main {
    flex: 1; min-height: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 16px 4px;
    gap: 12px;
  }
  .sec-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  /* 섹션 라벨 */
  .sec-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #555566;
  }

  /* 섹션 이름 */
  #cur-name {
    font-size: clamp(32px, 7vw, 64px);
    font-weight: 800; color: #f0f0f0;
    line-height: 1; letter-spacing: -0.02em;
    text-align: center;
  }
  #nxt-name {
    font-size: clamp(24px, 5.5vw, 48px);
    font-weight: 800; color: #44445a;
    line-height: 1; letter-spacing: -0.02em;
    text-align: center;
  }

  /* 메타 필 (곡 마커일 때만) */
  .col-meta {
    display: flex; gap: 5px; align-items: center; justify-content: center;
    flex-wrap: wrap;
  }
  #cur-meta { display: none; }
  #nxt-meta { display: none; }
  .meta-sm {
    font-size: 9px; font-weight: 700;
    color: #555566; background: #1e1e28;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.04em;
    display: none;
  }
  .meta-sm.vis { display: block; }

  /* 구분선 */
  #sec-divider-h {
    height: 1px; background: #2a2a36;
    margin: 0 16px; flex-shrink: 0;
  }

  /* 지금/다음 섹션 가운데: 구분선 + 카운트다운 */
  #cd-col {
    flex-shrink: 0;
    align-self: stretch;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  #sec-divider-v {
    width: 1px; height: 100%;
    background: #2a2a36;
  }
  #cd-wrap {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  #cd-wrap.visible { opacity: 1; }
  #cd-wrap.visible ~ #sec-divider-v,
  #cd-col:has(#cd-wrap.visible) #sec-divider-v { opacity: 0; }
  #cd-num {
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 900; color: #5DCAA5;
    line-height: 1; letter-spacing: -0.04em;
    background: #14141a; padding: 0 8px;
  }
  #cd-num.beat-pop {
    animation: beatpop 0.18s cubic-bezier(0.2,0,0.4,1) forwards;
  }
  @keyframes beatpop {
    0%   { transform: scale(1.45); color: #fff; }
    60%  { transform: scale(0.95); color: #5DCAA5; }
    100% { transform: scale(1.0);  color: #5DCAA5; }
  }

  /* ── 가사 영역 ── */
  #lyric-area {
    flex-shrink: 0;
    padding: 6px 20px 4px;
    display: flex;
    align-items: flex-start;
    overflow: visible;
  }
  #lyric-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 100%;
  }

  /* 다음 가사 영역 */
  #next-lyric-area {
    display: none;
  }
  #next-lyric-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 100%;
  }
  #next-lyric-area .lyric-char { font-size: clamp(11px, 2vw, 18px); }
  #next-lyric-area .chord-label { font-size: clamp(9px, 1.2vw, 11px); }

  /* 가사+코드 줄별 렌더 */
  .lyric-line {
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .lyric-char {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    font-size: clamp(15px, 2.8vw, 26px);
    font-weight: 700;
    line-height: 1.4;
    color: #c8c8d8;
    letter-spacing: 0.14em;
  }
  .lyric-char.ghost { min-width: 0.8em; }
  .chord-label {
    font-size: clamp(11px, 1.8vw, 16px);
    font-weight: 700;
    color: #5DCAA5;
    white-space: nowrap;
    line-height: 1.3;
    letter-spacing: 0;
  }
  .chord-label-empty { color: transparent; }

  /* 노트 (row 5) */
  .note {
    display: flex; align-items: flex-start;
    gap: 4px; font-size: 13px;
    color: #E8A840; line-height: 1.3;
    text-align: center; padding: 0 10px;
  }
  .note.hidden { display: none; }
  .ndot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #E8A840; flex-shrink: 0; margin-top: 3px;
  }
  #cur-note-wrap { grid-column: 1; grid-row: 3; }
  #nxt-note-wrap { grid-column: 3; grid-row: 3; }

  /* 섹션 전환 애니메이션 */
  .sec-fade {
    animation: secFade 0.3s ease forwards;
  }
  @keyframes secFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 진행률 바 (full-width, main 아래) ── */
  #progress-outer {
    flex-shrink: 0;
    height: 4px;
    background: #2a2a36;
    margin: 0 14px 6px;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%; width: 0%;
    background: #5DCAA5; border-radius: 2px;
  }

  /* ── BOTTOM: 섹션 휠 ── */
  #tl-vp { overflow: hidden; padding: 4px 0 10px; flex-shrink: 0; }
  #tl-track {
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; padding: 0 50%;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .sb {
    flex-shrink: 0; padding: 6px 12px; border-radius: 7px;
    font-size: 10px; font-weight: 700;
    color: #555566; background: #2a2a36;
    white-space: nowrap;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .sb.done     { background: #1a1a24; color: #2a2a3a; }
  .sb.active   { background: #5DCAA5; color: #0d0d12; font-size: 11px; padding: 7px 16px; }
  .sb.upcoming { color: #888899; }

  /* 오프라인 오버레이 */
  #offline {
    position: fixed; inset: 0;
    background: rgba(20,20,26,.92);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #555566;
    letter-spacing: 0.04em; z-index: 99;
  }
  #offline.hidden { display: none; }
  .inst-chord-grid { display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; justify-content: flex-start; padding: 2px 0; }
  .inst-chord-bar { display: flex; align-items: stretch; border: 1px solid #2a2a3a; border-radius: 5px; overflow: hidden; }
  .icb-num { display: flex; align-items: center; justify-content: center; font-size: 9px; color: #444; font-weight: 700; padding: 0 4px; border-right: 1px solid #2a2a3a; min-width: 16px; }
  .icb-beats { display: flex; }
  .icb-beat { width: 16px; min-height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a2a; padding: 2px 1px; }
  .icb-beat.icb-on { background: rgba(93,202,165,.06); }
  .icb-beat:last-child { border-right: none; }
  .icb-chord { font-size: 11px; color: #5DCAA5; font-weight: 700; white-space: nowrap; line-height: 1; }
  .icb-div { display: none; }
  .inst-disp-grid { display: flex; align-items: center; justify-content: center; flex-wrap: nowrap; gap: 0; padding: 4px 0; width: 100%; overflow-x: auto; }
  .inst-disp-bar { display: flex; flex: 0 0 auto; flex-direction: row; align-items: center; justify-content: center; gap: 10px; padding: 2px 12px; }
  .inst-disp-div { width: 1px; flex-shrink: 0; height: 32px; background: #333; margin: 0 4px; }
  .inst-disp-chord { font-size: clamp(13px,2.2vw,22px); color: #5DCAA5; font-weight: 700; line-height: 1.2; white-space: nowrap; }
  .inst-disp-dot { font-size: clamp(13px,2.2vw,22px); color: #2a2a3a; font-weight: 700; line-height: 1.2; }
</style>
</head>
<body>

<div id="offline">연결 중...</div>

<div id="top">
  <div id="clock"></div>
  <div id="song-vp"><div id="song-track"></div></div>
  <div id="meta-row">
    <div class="meta-pill" id="key-pill">--</div>
    <div class="meta-pill" id="ts-pill">4/4</div>
    <div class="meta-pill" id="bpm-pill">-- BPM</div>
  </div>
</div>

<div id="main">
  <div class="sec-col">
    <div class="sec-label" id="cur-label">지금</div>
    <div id="cur-name">--</div>
    <div class="col-meta" id="cur-meta">
      <span class="meta-sm" id="cur-key-sm"></span>
      <span class="meta-sm" id="cur-ts-sm"></span>
      <span class="meta-sm" id="cur-bpm-sm"></span>
    </div>
    <div class="note hidden" id="cur-note-wrap"><div class="ndot"></div><span id="cur-note"></span></div>
  </div>
  <div id="cd-col">
    <div id="sec-divider-v"></div>
    <div id="cd-wrap"><div id="cd-num">--</div></div>
  </div>
  <div class="sec-col">
    <div class="sec-label" id="nxt-label">다음</div>
    <div id="nxt-name">--</div>
    <div class="col-meta" id="nxt-meta">
      <span class="meta-sm" id="nxt-key-sm"></span>
      <span class="meta-sm" id="nxt-ts-sm"></span>
      <span class="meta-sm" id="nxt-bpm-sm"></span>
    </div>
    <div class="note hidden" id="nxt-note-wrap"><div class="ndot"></div><span id="nxt-note"></span></div>
  </div>
</div>

<div id="sec-divider-h"></div>

<div id="lyric-area"><div id="lyric-block"></div></div>

<div id="next-lyric-area"><div id="next-lyric-block"></div></div>

<div id="progress-outer"><div id="progress-fill"></div></div>

<div id="tl-vp"><div id="tl-track"></div></div>

<script>
  const $ = id => document.getElementById(id);

  // ── 시계 ──
  function updateClock() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    $('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── 가사 캐시 (/edit DATA 파싱) ──
  // flat sorted slide array: { songName: [{ secName, secIdx, relBar, slide }] }
  let lyricSlides = {};
  let lastKnownState = null;

  async function fetchLyricCache() {
    try {
      const html = await fetch('/edit').then(r => r.text());
      const m = html.match(/const DATA=(\[[\s\S]*?\]);/);
      if (!m) return;
      const data = JSON.parse(m[1]);
      lyricSlides = {};
      data.forEach(song => {
        const arr = [];
        (song.sections || []).forEach((sec, secIdx) => {
          (sec.slides || []).forEach(slide => {
            arr.push({ secName: sec.sec, secIdx, relBar: slide.startBar || 0, slide });
          });
        });
        arr.sort((a, b) => a.secIdx - b.secIdx || a.relBar - b.relBar);
        lyricSlides[song.song] = arr;
      });
      if (lastKnownState) applyState(lastKnownState);
    } catch(e) {}
  }

  function findCurrentEntry(songName, secIdx, barFloat) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    const inSec = arr.filter(e => e.secIdx === secIdx);
    if (!inSec.length) return null;
    let best = inSec[0];
    for (const e of inSec) { if (e.relBar <= barFloat) best = e; else break; }
    return best;
  }

  function findNextEntry(songName, secIdx, barFloat) {
    const arr = lyricSlides[songName];
    if (!arr || !arr.length) return null;
    return arr.find(e => e.secIdx > secIdx || (e.secIdx === secIdx && e.relBar > barFloat)) || null;
  }

  function findSlide(songName, secName, barFloat, forNext) {
    const list = lyricCache[songName]?.[secName];
    if (!list || !list.length) return null;
    // barFloat = anchorBar (absolute Logic bar); sec.startBar = absolute section start
    if (forNext) {
      const next = list.find(s => (s.startBar || 0) > barFloat) || list[0];
      return next.slides?.[0] || null;
    }
    // Find the section occurrence containing barFloat
    let sec = list[0];
    for (const s of list) {
      if ((s.startBar || 0) <= barFloat) sec = s;
      else break;
    }
    if (!sec.slides || !sec.slides.length) return null;
    const secStart = sec.startBar || 0;
    const relBar = barFloat - secStart;
    // sl.startBar: may be absolute (old saves) or relative (new saves, 0-based)
    // Auto-detect: if sl.startBar >= secStart and secStart > 0, it's absolute → convert
    let best = sec.slides[0];
    for (const sl of sec.slides) {
      const slRel = (secStart > 0 && sl.startBar >= secStart) ? sl.startBar - secStart : sl.startBar;
      if (slRel <= relBar) best = sl;
      else break;
    }
    return best;
  }
  function findTokens(songName, secName, barFloat, useFirst) {
    const sl = findSlide(songName, secName, barFloat, useFirst);
    return sl?.tokens?.length ? sl.tokens : null;
  }

  // 다음 슬라이드: ① 같은 occurrence 내 다음 슬라이드 → ② 같은 섹션명 다음 occurrence → ③ 다음 섹션
  function findNextSlide(songName, secName, barFloat, nextSecName) {
    const list = lyricCache[songName]?.[secName];
    if (list && list.length) {
      let secIdx = 0, sec = list[0];
      for (let i = 0; i < list.length; i++) {
        if ((list[i].startBar || 0) <= barFloat) { sec = list[i]; secIdx = i; }
        else break;
      }
      if (sec.slides && sec.slides.length > 1) {
        const secStart = sec.startBar || 0;
        const relBar = barFloat - secStart;
        let bestIdx = 0;
        for (let i = 0; i < sec.slides.length; i++) {
          const sl = sec.slides[i];
          const slRel = (secStart > 0 && sl.startBar >= secStart) ? sl.startBar - secStart : sl.startBar;
          if (slRel <= relBar) bestIdx = i;
          else break;
        }
        if (bestIdx + 1 < sec.slides.length) return sec.slides[bestIdx + 1];
      }
      if (secIdx + 1 < list.length) return list[secIdx + 1].slides?.[0] || null;
    }
    if (nextSecName) {
      const nxtList = lyricCache[songName]?.[nextSecName];
      if (nxtList && nxtList.length) return nxtList[0].slides?.[0] || null;
    }
    return null;
  }

  fetchLyricCache();

  // ── SSE ──
  let es, reconnectDelay = 1000;
  function connect() {
    es = new EventSource('/events');
    es.onopen = () => { $('offline').classList.add('hidden'); reconnectDelay = 1000; fetchLyricCache(); };
    es.onmessage = e => { try { lastKnownState = JSON.parse(e.data); applyState(lastKnownState); } catch {} };
    es.addEventListener('lyrics-updated', () => { fetchLyricCache(); });
    es.onerror = () => {
      $('offline').classList.remove('hidden');
      es.close();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 10000);
    };
  }

  // ── 진행률 RAF ──
  let prog = { rafId: null, rate: 0, startTs: 0, startVal: 0, isPlaying: false, section: '' };

  function updateProgress(progress, bpm, beatsPerBar, sectionLengthBars, isPlaying, section) {
    const wasPlaying   = prog.isPlaying;
    const secChanged   = section !== prog.section;
    prog.isPlaying     = isPlaying;
    prog.section       = section;

    if (sectionLengthBars > 0 && bpm > 0) {
      const secs = (sectionLengthBars * beatsPerBar) / (bpm / 60);
      prog.rate = 1.0 / secs;
    }

    if (!isPlaying) {
      if (prog.rafId) { cancelAnimationFrame(prog.rafId); prog.rafId = null; }
      $('progress-fill').style.width = (progress * 100).toFixed(2) + '%';
      return;
    }

    if (!wasPlaying || secChanged || !prog.rafId) {
      if (prog.rafId) { cancelAnimationFrame(prog.rafId); prog.rafId = null; }
      prog.startVal = progress;
      prog.startTs  = performance.now();
      rafLoop();
    }
  }

  function rafLoop() {
    prog.rafId = requestAnimationFrame(() => {
      const elapsed = (performance.now() - prog.startTs) / 1000;
      const est = Math.min(1, prog.startVal + prog.rate * elapsed);
      $('progress-fill').style.width = (est * 100).toFixed(2) + '%';
      if (est < 1 && prog.isPlaying) rafLoop();
      else prog.rafId = null;
    });
  }

  // ── 카운트다운 ──
  let lastCD = null;
  function showCountdown(val) {
    if (val === lastCD) return;
    lastCD = val;
    const el = $('cd-num');
    el.textContent = val;
    el.classList.remove('beat-pop');
    void el.offsetWidth;
    el.classList.add('beat-pop');
    $('cd-wrap').classList.add('visible');
  }
  function hideCountdown() {
    $('cd-wrap').classList.remove('visible');
    lastCD = null;
  }

  // ── 곡 휠 ──
  let lastSongIdx = -1, lastSongCount = 0;
  function renderSongWheel(songs, idx) {
    const track = $('song-track');
    track.innerHTML = '';
    songs.forEach((name, i) => {
      const d = i - idx;
      const el = document.createElement('span');
      el.className = 's-name' + (d===0?' active':d===-1?' p1':d===1?' n1':d===-2?' p2':d===2?' n2':'');
      el.textContent = name;
      if (Math.abs(d) > 2) el.style.visibility = 'hidden';
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 24;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
    });
  }

  // ── 섹션 타임라인 휠 ──
  let lastSecIdx = -1, lastSecCount = 0;
  function renderTimeline(secs, idx) {
    const track = $('tl-track');
    track.innerHTML = '';
    secs.forEach((name, i) => {
      const el = document.createElement('div');
      el.className = 'sb' + (i < idx ? ' done' : i === idx ? ' active' : ' upcoming');
      el.textContent = name;
      track.appendChild(el);
    });
    requestAnimationFrame(() => {
      const ch = track.children;
      if (!ch[idx]) return;
      let off = 0;
      for (let i = 0; i < idx; i++) off += ch[i].offsetWidth + 6;
      off += ch[idx].offsetWidth / 2;
      track.style.transform = `translateX(calc(50% - ${off}px - 50%))`;
    });
  }

  // ── 섹션 이름 전환 애니메이션 ──
  function animText(id, text) {
    const el = $(id);
    if (el.textContent === text) return;
    el.classList.remove('sec-fade');
    void el.offsetWidth;
    el.textContent = text;
    el.classList.add('sec-fade');
  }

  // ── 가사+코드 컬럼 렌더 ──
  function renderLyricBlock(blockEl, tokens, fallback) {
    blockEl.innerHTML = '';
    if (!tokens || tokens.length === 0) {
      (fallback || '').split('\n').forEach(line => {
        const lineEl = document.createElement('div');
        lineEl.className = 'lyric-line';
        const span = document.createElement('span');
        span.className = 'lyric-char';
        span.textContent = line;
        lineEl.appendChild(span);
        blockEl.appendChild(lineEl);
      });
      return;
    }
    let lines = [[]];
    tokens.forEach(t => {
      if (t.type === 'br') lines.push([]);
      else lines[lines.length - 1].push(t);
    });
    while (lines.length > 1 && lines[lines.length - 1].length === 0) lines.pop();
    lines.forEach(line => {
      const allGhost = line.length > 0 && line.every(t => t.type === 'ghost');
      const lineHasChord = line.some(t => t.chord);
      const lineEl = document.createElement('div');
      lineEl.className = 'lyric-line';
      if (allGhost) {
        lineEl.style.cssText = 'flex-wrap:wrap;justify-content:flex-start;gap:6px 0;';
      }
      line.forEach(t => {
        if (allGhost && !t.chord) return;
        const charEl = document.createElement('span');
        charEl.className = t.type === 'ghost' ? 'lyric-char ghost' : 'lyric-char';
        if (allGhost) charEl.style.cssText = 'min-width:2em;margin-right:12px;';
        if (lineHasChord && !(allGhost && !t.chord)) {
          const chordEl = document.createElement('span');
          chordEl.className = t.chord ? 'chord-label' : 'chord-label chord-label-empty';
          chordEl.textContent = t.chord || '\u00A0';
          charEl.appendChild(chordEl);
        }
        if (t.type === 'char') charEl.appendChild(document.createTextNode(t.char === ' ' ? '\u00A0' : (t.char || '')));
        else if (t.type === 'ghost') charEl.appendChild(document.createTextNode(' '));
        lineEl.appendChild(charEl);
      });
      blockEl.appendChild(lineEl);
    });
  }

  // ── 간주 표시 ──
  function renderInstDisplay(blockEl, instChords, barCount) {
    const bc = barCount || (instChords || []).length;
    const grid = document.createElement('div');
    grid.className = 'inst-disp-grid';
    for (let b = 0; b < bc; b++) {
      if (b > 0) { const d = document.createElement('div'); d.className = 'inst-disp-div'; grid.appendChild(d); }
      const bar = document.createElement('div');
      bar.className = 'inst-disp-bar';
      const slots = ((instChords || [])[b] || []).slice().sort((a, c) => a.pos - c.pos);
      // 4비트 슬롯으로 표시 (pos 0~7 → beat 0~3)
      const beatMap = {}; // beat(0~3) → chord name
      slots.forEach(s => { const beat = Math.floor((s.pos || 0) / 2); if (!beatMap[beat]) beatMap[beat] = s.name; });
      for (let beat = 0; beat < 4; beat++) {
        const cell = document.createElement('span');
        if (beatMap[beat]) {
          cell.className = 'inst-disp-chord'; cell.textContent = beatMap[beat];
        } else {
          cell.className = 'inst-disp-dot'; cell.textContent = '·';
        }
        bar.appendChild(cell);
      }
      grid.appendChild(bar);
    }
    blockEl.appendChild(grid);
  }
  function renderSlide(blockEl, slide, fallback) {
    blockEl.innerHTML = '';
    if (slide && slide.isInstrumental) {
      const ic = slide.instChords;
      if (ic && ic.some(b => b && b.length > 0)) {
        renderInstDisplay(blockEl, ic, slide.barCount);
      } else {
        // fallback: old ghost-token format
        renderLyricBlock(blockEl, slide.tokens, fallback);
      }
    } else {
      renderLyricBlock(blockEl, slide ? slide.tokens : null, fallback);
    }
  }

  // ── 상태 적용 ──
  function applyState(s) {
    // 곡 휠
    const songs = s.songs || [];
    const songIdx = s.currentSongIndex ?? -1;
    if (songIdx !== lastSongIdx || songs.length !== lastSongCount) {
      renderSongWheel(songs, songIdx);
      lastSongIdx = songIdx; lastSongCount = songs.length;
    }

    // 메타 (상단)
    const bpmStr = Math.round(s.bpm || 0) + ' BPM';
    const tsStr  = s.timeSignature || ((s.beatsPerBar || 4) + '/4');
    const keyStr = s.key || '';
    $('bpm-pill').textContent = bpmStr;
    $('ts-pill').textContent  = tsStr;
    $('key-pill').textContent = keyStr || '--';

    // 메타 (지금/다음 소형 필)
    function setMetaSm(prefix, show, kStr, tStr, bStr) {
      const k = kStr !== undefined ? kStr : keyStr;
      const t = tStr !== undefined ? tStr : tsStr;
      const b = bStr !== undefined ? (bStr ? Math.round(bStr) + ' BPM' : '') : bpmStr;
      [prefix+'-key-sm', prefix+'-ts-sm', prefix+'-bpm-sm'].forEach((id, i) => {
        const el = $(id);
        el.textContent = show ? [k, t, b][i] : '';
        el.classList.toggle('vis', show && !![k, t, b][i]);
      });
    }
    const curIsSong = songs.includes(s.currentSection || '');
    const nxtIsSong = s.nextSectionIsSong || songs.includes(s.nextSection || '');
    setMetaSm('cur', curIsSong);
    setMetaSm('nxt', nxtIsSong);

    // 섹션 이름
    animText('cur-name', s.currentSection || '--');
    animText('nxt-name', s.nextSection    || '--');

    // 가사+코드 (flat 순서 기준)
    const songName = songs[songIdx] || '';
    const barFloat = s.currentBarFloat ?? 0;
    const secIdx = s.currentSectionIndexInSong ?? -1;
    const curEntry = findCurrentEntry(songName, secIdx, barFloat);
    const nxtEntry = findNextEntry(songName, secIdx, barFloat);
    renderSlide($('lyric-block'), curEntry?.slide || null, s.lyricCue);
    renderSlide($('next-lyric-block'), nxtEntry?.slide || null, '');

    // 노트 (세션 노트)
    const curNote = s.note || '';
    $('cur-note').textContent = curNote;
    $('cur-note-wrap').classList.toggle('hidden', !curNote);

    const nxtNote = s.nextNote || '';
    $('nxt-note').textContent = nxtNote;
    $('nxt-note-wrap').classList.toggle('hidden', !nxtNote);

    // 진행률
    updateProgress(s.sectionProgress || 0, s.bpm || 120, s.beatsPerBar || 4,
                   s.sectionLengthBars || 0, s.isPlaying, s.currentSection || '');

    // 카운트다운
    if (s.countdownBars != null && s.countdownBars > 0) {
      showCountdown(s.countdownBars);
    } else {
      hideCountdown();
    }

    // 타임라인 휠
    const secs = s.currentSongSections || [];
    if (secIdx !== lastSecIdx || secs.length !== lastSecCount) {
      renderTimeline(secs, secIdx);
      lastSecIdx = secIdx; lastSecCount = secs.length;
    }
  }

  // ── 더미 데이터 ──
  if (window.location.protocol === 'file:' || new URLSearchParams(location.search).has('demo')) {
    $('offline').classList.add('hidden');
    const demoSlide = { isInstrumental: false, tokens: [
      {type:'char',char:'찬',chord:'G'},{type:'char',char:'양'},{type:'char',char:'해'},
      {type:'ghost',chord:'D/F#'},{type:'br'},
      {type:'char',char:'온',chord:'Em'},{type:'char',char:' '},{type:'char',char:'맘'},
      {type:'char',char:'다',chord:'C'},{type:'char',char:'해'},
    ], instChords: [], barCount: 4 };
    lyricCache['찬양해'] = { 'Chorus': [{ startBar: 9, totalBars: 8, slides: [demoSlide] }] };
    applyState({
      songs: ['은혜', '찬양해', '주님만', '할렐루야', '영광'],
      currentSongIndex: 1,
      currentSection: 'Chorus',
      nextSection: 'Bridge',
      sessionNote: '조금 느리게',
      nextSessionNote: '',
      lyricCue: '찬양해',
      bpm: 76, beatsPerBar: 4, timeSignature: '4/4', key: 'G', sectionLengthBars: 8,
      sectionProgress: 0.3, isPlaying: true, currentBarFloat: 9.5,
      currentSongSections: ['Intro','Verse1','Chorus','Bridge','Outro'],
      currentSectionIndexInSong: 2
    });
  }

  connect();
</script>
</body>
</html>
